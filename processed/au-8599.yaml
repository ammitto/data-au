reference: '8599'
names:
- text: DPRK Vessel Class
  name_type: Primary Name
  script: Latn
additional_info: |-
  All vessels within the DPRK Vessel Class are designated vessels. The DPRK Vessel class means all vessels ntitled to fly the flag of the DPRK or registered in the DPRK, or that are owned, operated or chartered by, or otherwise under the control or direction of, the following entities or persons:



  1 - The government of the DPRK



  2 - The Workers’ Party of Korea



  3 - The Korean People’s Army



  4 - A public body, corporation or agency of the DPRK



  5 - An entity formed or incorporated in the DPRK



  6 - An official of an entity mentioned in item 1, 2, 3, 4 or 5



  7 - An individual who is in, or a resident of, or a citizen of, the DPRK



  8 - An entity or person acting on behalf of, or at the direction of, an entity or a person mentioned in item 1, 2, 3, 4, 5, 6 or 7



  9 - An entity owned or controlled by a person or entity mentioned in item 1, 2, 3, 4, 5, 6 or 7
