additional_info: 'CFi.015 Designation: Founder and leader of the Unité pour la Paix
  en Centrafrique (UPC). National Identification No.: 10978000004482. Other information:
  Ali Darassa founded and still leads the Central African Republic (CAR)-based militia
  group Unité pour la Paix en Centrafrique (UPC), which has killed, tortured, raped,
  and displaced civilians, committed a large number of abuses of human rights and
  violations of international humanitarian law, and engaged in arms trafficking, illegal
  taxation activities, and warfare against CAR defence and security forces, as well
  as other militias, since its creation in 2014. In December 2020, he played a leading
  role in the creation of the Coalition des patriotes pour le changement (CPC) that
  took up arms to oppose the elections and attempted to enter the capital Bangui,
  in violation of the commitments made by the UPC under the Accord politique pour
  la paix et la reconciliation (APPR) signed on 6 February 2019.'
