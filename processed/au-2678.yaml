additional_info: QDe.140. Founded in 2012 as a splinter group of the Organization
  of Al-Qaida in the Islamic Maghreb (QDe.014). On 20 Aug. 2013, Al Moulathamoun merged
  with the Mouvement pour l’Unification et le Jihad en Afrique de l’Ouest (MUJAO)
  (QDe.134) and established Al Mourabitoun (QDe.141). Associated with the Organization
  of Al-Qaida in the Islamic Maghreb (QDe.014) and led by Mokhtar Belmokhtar (QDi.136).
  Active in the Sahel/Sahara region. Review pursuant to Security Council resolution
  2368 (2017) was concluded on 4 Dec. 2019. Review pursuant to Security Council resolution
  2610 (2021) was concluded on 30 October 2023.
