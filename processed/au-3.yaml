additional_info: 'TAi.003. Title: Maulavi. Designation: a) Second Deputy, Economic
  affairs, Council of Ministers under the Taliban regime b) Governor of Nangarhar
  Province under the Taliban regime c) Head of Eastern Zone under the Taliban regime.
  Active in terrorist operations in Eastern Afghanistan. Collects money from drug
  traffickers. Believed to be in Afghanistan/Pakistan border area. Member of the Taliban
  Supreme Council as at 2009. Belongs to Zadran tribe. Review pursuant to Security
  Council resolution 1822 (2008) was concluded on 23 Jul. 2010. Family is originally
  from Neka District, Paktia Province, Afghanistan. Responsible for attack on Afghan
  parliamentarians in November 2007 in Baghlan; owns land in central Baghlan Province.'
