additional_info: 'TAi.102 Title: Maulavi. Governor of Logar Province under the Taliban
  regime. Involved in drug trafficking. Taliban member responsible for military affairs
  in Takhar province, Afghanistan, as of May 2007. Facilitated fund raising in the
  Gulf on behalf of the Taliban since 2003. Also facilitated meetings between Taliban
  officials and wealthy supporters and arranged for more than a dozen individuals
  to travel to Kabul, Afghanistan, for suicide attacks. Believed to be in the Gulf
  region. Review pursuant to Security Council resolution 1822 (2008) was concluded
  on 23 Jul. 2010.'
