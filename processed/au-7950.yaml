additional_info: 'CDi.043 Designation: a) Secretary General and leader for the Coalition
  nationale du people pour la souveraineté du Congo (CNPSC) (until February 2023)
  b) founder and leader for MAI-MAI YAKUTUMBA. Other information: Listed pursuant
  to paragraphs 7 (c), 7 (d), 7 (e) and 7 (g) of resolution 2293 (2016) as “being
  political and military leaders of Congolese militias, including those receiving
  support from outside the DRC, who impede the participation of their combatants in
  disarmament, demobilization and reintegration processes;” “recruiting or using children
  in armed conflict in the DRC in violation of applicable international law;” “planning,
  directing, committing acts in the DRC that constitute human rights violations or
  abuses or violations of international humanitarian law, as applicable, including
  those acts involving the targeting of civilians, including killing and maiming,
  rape and other sexual violence, abduction, forced displacement, and attacks on schools
  and hospitals;” and “supporting individuals or entities, including armed groups
  or criminal networks, involved in destabilizing activities in the DRC through the
  illicit exploitation or trade of natural resources, including gold or wildlife as
  well as wildlife products”, as reaffirmed by paragraph 2 of resolution 2688 (2023).
  As the leader of the MAI MAI YAKUTUMBA, one of the largest CNPSC militia, WILLIAM
  AMURI YAKUTUMBA is involved in planning, promulgating and supporting the militia’s
  activities. He has effective command and control over the militia’s combatants.'
