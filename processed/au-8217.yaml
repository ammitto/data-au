  involved in planning and leading the mutiny of 1 April 2010, culminating with the
  illegal apprehension of the Prime Minister, Carlo Gomes Junior, and the then Chief
  of Staff of the Armed Forces, José Zamora Induta; during the 2012 electoral period,
  in his capacity as Chief of Staff of the Armed Forces, Injai made statements threatening
  to overthrow the elected authorities and to put an end to the electoral process;
  António Injai has been involved in the operational planning of the coup d’état of
  12 April 2012. In the aftermath of the coup, the first communiqué by the “Military
  Command” was issued by the Armed Forces General Staff, which is led by General Injai.”
