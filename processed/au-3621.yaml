additional_info: QDe.161. Islamic State of Iraq and the Levant - Khorasan (ISIL -
  K) was formed on January 10, 2015 by a former Tehrik-e Taliban Pakistan (TTP) (QDe.132)
  commander and was established by former Taliban faction commanders who swore an
  oath of allegiance to the Islamic State of Iraq and the Levant (listed as Al-Qaida
  in Iraq (QDe.115)). ISIL – K has claimed responsibility for numerous attacks in
  both Afghanistan and Pakistan.
