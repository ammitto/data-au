additional_info: KPe.028. The Munitions Industry Department is involved in key aspects
  of the DPRK's missile program. MID is responsible for overseeing the development
  of the DPRK's ballistic missiles, including the Taepo Dong-2.The MID oversees the
  DPRK's weapons production and R&D programs, including the DPRK's ballistic missile
  program. The Second Economic Committee and the Second Academy of Natural Sciences
  – also designated in August 2010 – are subordinate to the MID. The MID in recent
  years has worked to develop the KN08 road-mobile ICBM. The MID oversees the DPRK's
  nuclear program. The Nuclear Weapons Institute is subordinate to the MID.
