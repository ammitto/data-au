additional_info: 'TAi.011 Title: a) Maulavi b) Mullah. Designation: Minister of Civil
  Aviation and Transportation under the Taliban regime. Passport no.:  Afghan SE-011697,
  issued on 25 Jan. 1988, issued in Kabul, Afghanistan (expired on 23 Feb. 2000).
  Involved in drug trafficking as of 2011, primarily through Gerd-e-Jangal, Afghanistan.
  Active in the provinces of Khost, Paktia and Paktika, Afghanistan as of May 2007.
  Taliban "Governor" of Kandahar as of May 2007. Deputy to Mullah Abdul Ghani Baradar
  (TAi.024) in the Taliban Supreme Council as of 2009. Taliban official responsible
  for four southern provinces of Afghanistan. Following the arrest of Mullah Baradar
  in February 2010 he was temporarily-in-charge of the Taliban Supreme Council. Believed
  to be in Afghanistan/Pakistan border area. Belongs to Ishaqzai tribe. Review pursuant
  to Security Council resolution 1822 (2008) was concluded on 21 Jul. 2010. Reportedly
  killed in May 2016.'
