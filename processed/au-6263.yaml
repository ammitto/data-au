additional_info: 'YEi.006. Designation: a) Director, or General Manager, of the Criminal
  Investigation Department (CID), Sana’a based ministry of interior, in Sana’a, Yemen
  b) Brigadier. National identification no.:  na a) Yemen national identification
  number: 10010095104, issued on 26 December 2013 b) Yemen military identification
  number: 20432 (issued in 2018). Sultan Saleh Aida Aida Zabin has engaged in acts
  that threaten the peace, security and stability of Yemen, including violations of
  applicable international humanitarian law and human rights abuses in Yemen.  Zabin
  has played a prominent role in a policy of intimidation and of use of systematic
  arrest, detention, torture, sexual violence and rape against politically active
  women.  Zabin as director for CID is directly responsible for, or by virtue of his
  authority responsible for, and complicit in the use of multiple places of detention
  including house arrest, police stations, formal prisons and detention centres and
  undisclosed detention centres.  In these sites, women, including at least one minor,
  were forcibly disappeared, repeatedly interrogated, raped, tortured, denied timely
  medical treatment and subjected to forced labour.  Zabin himself directly inflicted
  torture in some cases.'
