additional_info: 'TAi.153 Prominent Taliban financier. As of mid-2009, supplied weapons,
  ammunition, explosives and medical equipment to Taliban fighters; and raised funds
  for the Taliban, and provided training to them, in the Afghanistan/Pakistan border
  region. Has previously organized and funded Taliban operations in Kandahar Province,
  Afghanistan. As of 2010, travelled to and owned businesses in Dubai, United Arab
  Emirates, and Japan. Belongs to Noorzai tribe, Miralzai sub-tribe. Brother of Malik
  Noorzai (TI.N.154.11.). Father’s name is Akhtar Mohammed (a.k.a.: Haji Mira Khan).  '
