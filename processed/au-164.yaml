additional_info: QDe.002. Reported to have operated in Somalia and Ethiopia and to
  have merged with Harakat Al-Shabaab Al-Mujaahidiin (Al-Shabaab), which was accepted
  as an affiliate of Al-Qaida (QDe.004) by Aiman Muhammed Rabi al-Zawahiri (QDi.006)
  in Feb. 2012, and is also subject to the sanctions measures set out in Security
  Council resolution 1844 (2008) concerning Somalia and Eritrea (see https://www.un.org/sc/suborg/en/sanctions/751).
  Leadership included Hassan Dahir Aweys (QDi.042). AIAI has received funds through
  the Al-Haramain Islamic Foundation (Somalia) (QDe.072). Review pursuant to Security
  Council resolution 1822 (2008) was concluded on 21 Jun. 2010. Review pursuant to
  Security Council resolution 2368 (2017) was concluded on 24 November 2020.
