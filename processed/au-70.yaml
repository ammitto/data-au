additional_info: 'TAi.070 Title: a) Haji b) Mullah Designation: a) Director of Foreign
  Relations, Kandahar Province under the Taliban regime, b) Director of Public Works,
  Kandahar Province under the Taliban regime, c) First Deputy Minister of Agriculture
  under the Taliban regime, d) Deputy Minister of Public Works under the Taliban regime.
  Originally from Uruzgan, settled and lived later in Kandahar. Was a member of Taliban
  Supreme Council Political Commission in 2010. No specific role in the Taliban movement,
  active as a businessman in his personal capacity as of mid-2013. Believed to be
  in Afghanistan/Pakistan border area. Belongs to Alizai tribe. Brother of Abdul Jalil
  Haqqani Wali Mohammad (TI.A.34.01). Review pursuant to Security Council resolution
  1822 (2008) was concluded on 27 Jul. 2010.'
