additional_info: 'CFi.012 Title: President of the Conseil National de Défense et de
  Sécurité (CNDS) and military leader of the Front Populaire pour la Renaissance de
  la Centrafrique. Designation: "general". Passport no.: a) CAR diplomatic passport
  no. D00000897, issued on 5 Apr. 2013 (valid until 4 April 2018) b) CAR diplomatic
  passport no. D00004262, issued on 11 March 2014 (expires on 10 March 2019). National
  identification no: Chad national identity card no. 103-00653129-22, issued on 21
  April 2009 (expires on 21 April 2019). Hissène was formerly the Minister of Youth
  and Sports as part of the Cabinet for the Central African Republic''s former President
  Michael Djotodia. Prior to that, he was the head of the Convention of Patriots for
  Justice and Peace, a political party. He also established himself as a leader of
  armed militias in Bangui, in particular in the "PK5" (3rd district) neighborhood.
  In October 2016, Abdoulaye Hissène was appointed President of the Conseil National
  de Défense et de Sécurité, a body which was created at the time to gather military
  leaders and commanding fighters from all ex-Séléka factions. He has remained in
  this position since then, but has actual control over FPRC fighters only. Father''s
  name is Abdoulaye. Mother''s name is Absita Moussa.'
