  of thousands of civilians across Central Africa. The LRA has been responsible for
  kidnapping, displacing, committing sexual violence against, and killing hundreds
  of individuals across CAR, and has looted and destroyed civilian property. Father’s
  name is Luizi Obol. Mother’s name is Nora Obol.'
