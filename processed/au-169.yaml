additional_info: 'QDi.012. Ration Card no. 0094195. Joined Al-Qaida in 1996 and was
  at that time an important liaison to the Taliban in Afghanistan. Received money
  from Ansar al-Islam (QDe.098) in order to conduct attacks in Kirkuk and Ninveh in
  Iraq during spring and summer of 2005. Al-Qaida senior official. In custody of the
  United States of America, as of August 2014. Father’s name: Abd al-Razzaq Abd al-Baqi.
  Mother’s name: Nadira Ayoub Asaad. Photo available for inclusion in the INTERPOL-UN
  Security Council Special Notice. Review pursuant to Security Council resolution
  1822 (2008) was concluded on 15 Jun. 2010. Review pursuant to Security Council resolution
  2368 (2017) was concluded on 24 November 2020.'
