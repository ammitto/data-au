additional_info: 'TAi.006. Title: Mullah. Designation: a) Director of Administrative
  Affairs of the Taliban regime b) Head of Information and Culture in Kandahar province
  under the Taliban regime. Graduate of the Haqqaniya Madrassa in Akora Khattak, Pakistan.
