  Believed to be in the Afghanistan/Pakistan border area. Member of Taliban Supreme
  Council as at June 2010. Belongs to Barakzai tribe. Review pursuant to Security
  Council resolution 1822 (2008) was concluded on 27 Jul. 2010. Reportedly deceased
