additional_info: Became ‘Mayor of Sevastopol’ by popular acclamation on 23 February
  2014 and accepted this ‘vote’ into office. Actively campaigned for Sevastopol to
  become a separate entity of Russia.  He was one of the co-signatories of the ‘treaty
  on Crimea's accession to the Russian Federation’ of 18 March 2014.  He was an acting
  ‘governor’ of Sevastopol from 1 to 14 April 2014 and former ‘elected’ Chairman of
  the Sevastopol Legislative Assembly.  Member of the Sevastopol Legislative Assembly
  since 15 September 2014. Was also speaker of the Assembly from 22 September 2014
  until he stepped down on 22 March 2016.  Was awarded Russian State order ‘For Merit
  to the Fatherland’ — first degree for involvement in the annexation process
