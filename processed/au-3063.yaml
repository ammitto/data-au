additional_info: QDe.146. Associated with the Organization of Al-Qaida in the Islamic
  Maghreb (QDe.014), Al Mourabitoun (QDe.141), Ansar al-Shari’a in Tunisia (AAS-T)
  (QDe.143), and Ansar al Charia Derna (QDe.145). The leader is Mohamed al-Zahawi
  (not listed). Runs training camps for foreign terrorist fighters travelling to Syria,
  Iraq and Mali. Review pursuant to Security Council resolution 2368 (2017) was concluded
  on 4 Dec. 2019. Review pursuant to Security Council resolution 2610 (2021) was concluded
  on 30 October 2023.
