additional_info: QDe.130. Was established in Afghanistan in 1980. In 1993, Harakat-ul
  Jihad Islami merged with Harakat ul-Mujahidin (QDe.008) to form Harakat ul-Ansar.
  In 1997, Harakat-ul Jihad Islami split from Harakat ul-Ansar and resumed using its
  former name. Operations are in India, Pakistan and Afghanistan. Banned in Pakistan.
  Review pursuant to Security Council resolution 2368 (2017) was concluded on 24 November
  2020.
