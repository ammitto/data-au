address: Yemen
additional_info: "YEe.001. Listed pursuant to paragraph 5 of resolution 2624 (2022)
  as subject to the measures imposed by paragraph 14 of resolution 2216 (2015) (targeted
  arms embargo). The Houthis have engaged in acts that threaten the peace, security,
  and stability of Yemen. The Houthis have engaged in attacks striking civilians and
  civilian infrastructure in Yemen, implemented a policy of sexual violence and repression
  against politically active and professional women, engaged in the recruitment and
  use of children, incited violence against groups including on the basis of religion
  and nationality, and indiscriminately used landmines and improvised explosive devices
  on the West Coast of Yemen. The Houthis have also obstructed the delivery of humanitarian
  assistance to Yemen, or access to, or distribution of, humanitarian assistance in
  Yemen. The Houthis have conducted attacks on commercial shipping in the Red Sea
  using waterborne improvised explosive devices and sea mines. The Houthis have also
  perpetrated repeated cross-border terrorist attacks striking civilians and civilian
  infrastructure in the Kingdom of Saudi Arabia and the United Arab Emirates and threatened
  to intentionally target civilian sites. \nAnsar Allah also appears on the Consolidated
  List under the primary name ‘THE HOUTHIS’, pursuant to the listing of THE HOUTHIS
  under the UNSCR 2140 framework. The UNSCR 2140 framework imposes an arms embargo."
