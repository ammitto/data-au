additional_info: 'TAi.040 Title: Maulavi. Minister of Frontier Affairs of the Taliban
  regime. He is an active Taliban leader. Father of Sirajuddin Jallaloudine Haqqani
  (TI.H.144.07.), Nasiruddin Haqqani (TI.H.146.10 and Badruddin Haqqani (deceased).  Brother
  of Mohammad Ibrahim Omari (TI.O.42.01) and Khalil Ahmed Haqqani (TI.H.150.11) .
  Believed to be in the Afghanistan/Pakistan border area.  Head of the Taliban Miram
  Shah Shura as at 2008. Belongs to Zadran tribe. Review pursuant to Security Council
  resolution 1822 (2008) was concluded on 27 Jul. 2010. Reportedly deceased as of
  September 2018.'
