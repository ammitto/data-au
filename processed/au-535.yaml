additional_info: QDe.119. Founded and led by Najmiddin Kamolitdinovich Jalolov (deceased)
  and Suhayl Fatilloevich Buranov (deceased). Associated with the Islamic Movement
  of Uzbekistan (QDe.010) and Emarat Kavkaz (QDe.131). Active in the Afghanistan/Pakistan
  border area, Central Asia, South Asia region and some European States. Review pursuant
  to Security Council resolution 1822 (2008) was concluded on 20 May 2010. Review
  pursuant to Security Council resolution 2368 (2017) was concluded on 24 November
  2020.
