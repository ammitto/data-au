additional_info: TAe.012 Network of Taliban fighters centered around the border between
  Khost Province, Afghanistan and North Waziristan, Pakistan. Founded by Jalaluddin
  Haqqani (TI.H.40.01.) and currently headed by his son Sirajuddin Jallaloudine Haqqani
  (TI.H.144.07.). Other listed members include Nasiruddin Haqqani (TI.H.146.10.),
  Sangeen Zadran Sher Mohammad (TI.Z.152.11.), Abdul Aziz Abbasin (TI.A.155.11.),
  Fazl Rabi (TI.R.157.12.), Ahmed Jan Wazir (TI.W.159.12.), Bakht Gul (TI.G.161.12.),
  Abdul Rauf Zakir (TI.Z.164.12.). Responsible for suicide attacks and targeted assassination
  as well as kidnappings in Kabul and other provinces of Afghanistan. Linked to Al-Qaida
  (QE.A.4.01.), Islamic Movement of Uzbekistan (QE.I.10.01.), Tehrik-e Taliban Pakistan
  (QE.T.132.11.), Lashkar I Jhangvi (QE.L.96.03.), and Jaish-IMohammed (QE.J.19.01.).
